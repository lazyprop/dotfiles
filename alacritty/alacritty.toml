#"window.opacity" = 1

[colors]
#black = "0x585858"
#blue = "0xb8b8b8"
#cyan = "0xa16946"
draw_bold_text_with_bright_colors = false
#green = "0x282828"
#magenta = "0xe8e8e8"
#red = "0xdc9656"
#white = "0xf8f8f8"
#yellow = "0x383838"

[colors.primary]
background = "0x181818"
foreground = "0xd8d8d8"

[font]
size = 8

[font.normal]
family = "monospace"

[[keyboard.bindings]]
action = "ToggleViMode"
key = "Space"
mods = "Shift|Control"

[[keyboard.bindings]]
action = "ToggleViMode"
key = "I"
mode = "Vi"
